<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon and Theme -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" sizes="any" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#050505" />
    
    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Regnum Decimarum" />
    
    <!-- SEO Meta Tags -->
    <title>Regnum Decimarum - Premium Service Portfolio</title>
    <meta name="description" content="A refined portfolio of digital, hospitality, construction, and private transport services delivered with precision, presence, and passion." />
    <meta name="keywords" content="digital marketing, hospitality, interior finishing, private transport, premium services, Zagreb, Croatia" />
    <meta name="author" content="Regnum Decimarum" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="30 days" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Regnum Decimarum - Premium Service Portfolio" />
    <meta property="og:description" content="A refined portfolio of digital, hospitality, construction, and private transport services delivered with precision, presence, and passion." />
    <meta property="og:url" content="https://jureljubodev.github.io/regnumdecimarum-web/" />
    <meta property="og:site_name" content="Regnum Decimarum" />
    <meta property="og:image" content="https://jureljubodev.github.io/regnumdecimarum-web/favicon-192.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Regnum Decimarum" />
    <meta name="twitter:description" content="Premium service portfolio - Digital, Hospitality, Finishing, Transport" />
    <meta name="twitter:image" content="https://jureljubodev.github.io/regnumdecimarum-web/favicon-192.png" />
    
    <!-- Security & Performance -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:;" />
    
    <!-- Fonts with Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://jureljubodev.github.io/regnumdecimarum-web/" />
  </head>
  <body>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="language" />
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
