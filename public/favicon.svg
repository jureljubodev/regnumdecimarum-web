<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Regnum Decimarum favicon">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#0f0f10" />
			<stop offset="100%" stop-color="#050505" />
		</linearGradient>
		<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#f4e5b7" />
			<stop offset="45%" stop-color="#d8b677" />
			<stop offset="100%" stop-color="#b88a44" />
		</linearGradient>
		<filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.45" />
		</filter>
	</defs>

	<rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)" />
	<rect x="20" y="20" width="216" height="216" rx="52" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

	<g filter="url(#softGlow)" fill="url(#gold)">
		<text
			x="128"
			y="152"
			text-anchor="middle"
			font-family="Playfair Display, Georgia, serif"
			font-size="108"
			font-weight="700"
			letter-spacing="4"
		>RD</text>
	</g>
</svg>